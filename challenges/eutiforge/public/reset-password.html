<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - EutiForge</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a href="/" class="nav-brand">EutiForge</a>
      <div class="nav-links">
        <a href="/login.html" class="btn btn-secondary btn-sm">Log In</a>
      </div>
    </div>
  </nav>

  <main class="auth-page">
    <div class="auth-card card">
      <h2>Reset Your Password</h2>
      <p class="text-muted text-sm mb-24">Enter the email address associated with your account and we'll send you a reset link.</p>
      <div id="alert" class="alert"></div>
      <form id="resetForm">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
        </div>
        <button type="submit" id="submitBtn" class="btn btn-primary btn-full">Send Reset Link</button>
      </form>
      <div class="auth-links mt-16">
        <a href="/login.html">Back to Log In</a>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script>
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alertEl = document.getElementById('alert');
      const btn = document.getElementById('submitBtn');

      btn.disabled = true;
      btn.textContent = 'Sending...';
      alertEl.className = 'alert';

      try {
        const res = await apiCall('/auth/password-reset', {
          method: 'POST',
          body: JSON.stringify({
            email: document.getElementById('email').value
          })
        });

        const data = await res.json();

        if (res.ok) {
          alertEl.textContent = data.message;
          alertEl.className = 'alert alert-success show';
        } else {
          alertEl.textContent = data.message;
          alertEl.className = 'alert alert-error show';
        }
      } catch (err) {
        alertEl.textContent = 'Network error. Please try again.';
        alertEl.className = 'alert alert-error show';
      }

      btn.disabled = false;
      btn.textContent = 'Send Reset Link';
    });
  </script>
</body>
</html>
