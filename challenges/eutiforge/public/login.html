<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - EutiForge</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a href="/" class="nav-brand">EutiForge</a>
      <div class="nav-links">
        <a href="/signup.html" class="btn btn-primary btn-sm">Sign Up</a>
      </div>
    </div>
  </nav>

  <main class="auth-page">
    <div class="auth-card card">
      <h2>Welcome Back</h2>
      <div id="alert" class="alert"></div>
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        <button type="submit" id="submitBtn" class="btn btn-primary btn-full">Log In</button>
      </form>
      <div class="auth-links">
        <a href="/reset-password.html">Forgot your password?</a>
        <a href="/signup.html">Don't have an account? Sign Up</a>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alertEl = document.getElementById('alert');
      const btn = document.getElementById('submitBtn');

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      alertEl.className = 'alert';

      try {
        const res = await apiCall('/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });

        const data = await res.json();

        if (!res.ok) {
          alertEl.textContent = data.message;
          alertEl.className = 'alert alert-error show';
          btn.disabled = false;
          btn.textContent = 'Log In';
          return;
        }

        saveSession(data.token, data.user);

        if (data.user.role === 'admin') {
          window.location.href = '/admin.html';
        } else if (data.user.role === 'creator') {
          window.location.href = '/creator-dashboard.html';
        } else {
          window.location.href = '/dashboard.html';
        }
      } catch (err) {
        alertEl.textContent = 'Network error. Please try again.';
        alertEl.className = 'alert alert-error show';
        btn.disabled = false;
        btn.textContent = 'Log In';
      }
    });
  </script>
</body>
</html>
