<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — EutiBites</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-brand">Euti<span>Bites</span></a>
    <ul class="nav-links">
      <li><a href="/recipes">Recipes</a></li>
      <li><a href="/login" class="btn-nav">Sign In</a></li>
    </ul>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <h2>Create Your Account</h2>
      <p class="subtitle">Join the EutiBites community today</p>

      <div id="error-display" class="error-banner hidden"></div>

      <form id="register-form">
        <div class="form-group">
          <label for="displayName">Display Name</label>
          <input type="text" id="displayName" name="displayName" placeholder="Chef Gordon" required>
        </div>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="chefgordon" required>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Create a password" required>
          <!-- VULN 6: Policy exists but min 8 is still weak — should be 12+ -->
          <small style="color: var(--text-muted); font-size: 0.78rem;">Min 8 characters, must include uppercase, lowercase, number, and special character</small>
        </div>
        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>

      <div class="auth-footer">
        <p>Already have an account? <a href="/login">Sign in</a></p>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errDiv = document.getElementById('error-display');
      errDiv.classList.add('hidden');

      const displayName = document.getElementById('displayName').value;
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ displayName, username, email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          errDiv.textContent = data.error;
          errDiv.classList.remove('hidden');
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } catch (err) {
        errDiv.textContent = 'Connection error. Please try again.';
        errDiv.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
