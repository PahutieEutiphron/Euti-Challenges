<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipes — EutiBites</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-brand">Euti<span>Bites</span></a>
    <ul class="nav-links" id="nav-links">
      <li><a href="/recipes">Recipes</a></li>
      <li id="nav-auth-links"></li>
    </ul>
  </nav>

  <div class="container">
    <h1 class="section-title" style="margin-top: 1rem;">All Recipes</h1>

    <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
      <input type="text" id="search-input" placeholder="Search recipes..." style="flex: 1; min-width: 200px; padding: 0.65rem 1rem; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 0.95rem;">
      <select id="category-filter" style="padding: 0.65rem 1rem; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 0.95rem; background: white;">
        <option value="">All Categories</option>
        <option value="pasta">Pasta</option>
        <option value="bbq">BBQ</option>
        <option value="curry">Curry</option>
        <option value="bread">Bread</option>
        <option value="risotto">Risotto</option>
        <option value="other">Other</option>
      </select>
      <select id="sort-filter" style="padding: 0.65rem 1rem; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 0.95rem; background: white;">
        <option value="newest">Newest</option>
        <option value="rating">Top Rated</option>
      </select>
    </div>

    <div class="recipe-grid" id="recipe-grid"></div>
  </div>

  <footer class="footer">
    <p>EutiBites &copy; 2026</p>
  </footer>

  <script src="/js/app.js"></script>
  <script>
    let allRecipes = [];

    async function loadRecipes() {
      const category = document.getElementById('category-filter').value;
      const search = document.getElementById('search-input').value;
      const sort = document.getElementById('sort-filter').value;

      const params = new URLSearchParams();
      if (category) params.set('category', category);
      if (search) params.set('search', search);
      if (sort) params.set('sort', sort);

      const res = await fetch('/api/recipes?' + params.toString());
      const recipes = await res.json();
      const grid = document.getElementById('recipe-grid');
      grid.innerHTML = recipes.length
        ? recipes.map(r => recipeCard(r)).join('')
        : '<p style="color: var(--text-muted); grid-column: 1/-1; text-align: center; padding: 3rem;">No recipes found.</p>';
    }

    document.addEventListener('DOMContentLoaded', () => {
      updateNav();
      loadRecipes();

      document.getElementById('category-filter').addEventListener('change', loadRecipes);
      document.getElementById('sort-filter').addEventListener('change', loadRecipes);

      let debounce;
      document.getElementById('search-input').addEventListener('input', () => {
        clearTimeout(debounce);
        debounce = setTimeout(loadRecipes, 300);
      });
    });
  </script>
</body>
</html>
